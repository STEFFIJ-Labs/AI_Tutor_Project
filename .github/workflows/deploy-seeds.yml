      # ============================================================
      # VERIFICATION - expected row counts from generate_seeds.py:
      #   content_unit : 2105
      #   lemma        : 1603
      #   morpho_form  : 2490
      #   media_asset  : 1151
      # ============================================================
      - name: "VERIFY - Row counts"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          SQL="SELECT table_name, COUNT(*)::text AS rows FROM (
            SELECT 'language_variant' AS table_name, COUNT(*) FROM language_variant UNION ALL
            SELECT 'tone_marker',          COUNT(*) FROM tone_marker UNION ALL
            SELECT 'cultural_context_tag', COUNT(*) FROM cultural_context_tag UNION ALL
            SELECT 'ai_model_registry',    COUNT(*) FROM ai_model_registry UNION ALL
            SELECT 'content_unit',         COUNT(*) FROM content_unit UNION ALL
            SELECT 'lemma',                COUNT(*) FROM lemma UNION ALL
            SELECT 'morpho_form',          COUNT(*) FROM morpho_form UNION ALL
            SELECT 'media_asset',          COUNT(*) FROM media_asset UNION ALL
            SELECT 'rel_content_tone',     COUNT(*) FROM rel_content_tone UNION ALL
            SELECT 'rel_content_context',  COUNT(*) FROM rel_content_context
          ) counts ORDER BY table_name;"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Seed verification row counts:"
          echo "$BODY" | jq .
          CONTENT_ROWS=$(echo "$BODY" | jq -r '.[] | select(.table_name == "content_unit") | .rows')
          if [ "$CONTENT_ROWS" = "0" ] || [ -z "$CONTENT_ROWS" ]; then
            echo "VERIFICATION FAILED - content_unit is empty"
            exit 1
          fi
          echo "ALL SEEDS VERIFIED OK - content_unit has $CONTENT_ROWS rows"
