name: Deploy Seeds

on:
  workflow_run:
    workflows: ["Deploy Schema to Supabase"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-seeds:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      # ============================================================
      # WHY jq -Rs . < file AND NOT SQL=$(cat file):
      # Documented in Relazione_Tecnica_Forense_Completa.docx §4.3
      # SQL=$(cat file) passes file content as bash argument -> hits
      # Linux kernel ~128KB argument limit -> exit 126.
      # jq -Rs . < file reads via stdin, no limit applies.
      # Same pattern as deploy-schema.yml for schema.sql.
      # ============================================================

      - name: "SEED 01 - language_variant, tone_marker, cultural_context_tag, ai_model_registry"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < sql/seed_01_lookup.sql)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE | $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "FAILED: seed_01_lookup.sql"; exit 1
          fi

      - name: "SEED 01b - Insert und fallback language variant"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          SQL="INSERT INTO language_variant (iso_code, variant_name, is_pivot, parent_variant_id) VALUES ('und', 'Undetermined', false, NULL) ON CONFLICT (iso_code) DO NOTHING;"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE | $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "FAILED: und insert"; exit 1
          fi

