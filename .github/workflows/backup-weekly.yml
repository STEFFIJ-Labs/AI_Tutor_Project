name: Weekly Database Backup

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Rotate previous backup
        run: |
          mkdir -p backup
          if [ -f backup/dump_ai_tutor.sql ]; then
            cp backup/dump_ai_tutor.sql backup/dump_ai_tutor_prev.sql
            echo "Rotated: dump_ai_tutor.sql -> dump_ai_tutor_prev.sql"
            echo "Previous backup lines: $(wc -l < backup/dump_ai_tutor_prev.sql)"
          else
            echo "No previous backup found — first run."
          fi

      - name: Dump database to SQL file
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump \
            "postgresql://postgres.${SUPABASE_PROJECT_ID}:${SUPABASE_DB_PASSWORD}@aws-1-eu-west-1.pooler.supabase.com:5432/postgres" \
            -n public \
            --no-owner \
            --no-acl \
            -f backup/dump_ai_tutor.sql
          echo "Dump completed."
          echo "Lines in new backup: $(wc -l < backup/dump_ai_tutor.sql)"
          echo "INSERT rows: $(grep -c '^INSERT INTO' backup/dump_ai_tutor.sql || echo 0)"

      - name: Verify backup contains data
        run: |
          INSERT_COUNT=$(grep -c '^INSERT INTO' backup/dump_ai_tutor.sql || echo 0)
          echo "INSERT statements found: $INSERT_COUNT"
          if [ "$INSERT_COUNT" -lt 100 ]; then
            echo "BACKUP FAILED — fewer than 100 INSERT rows found."
            if [ -f backup/dump_ai_tutor_prev.sql ]; then
              cp backup/dump_ai_tutor_prev.sql backup/dump_ai_tutor.sql
              echo "Restored previous backup to protect data."
            fi
            exit 1
          fi
          echo "Backup verified OK — $INSERT_COUNT INSERT rows."

      - name: Commit both backups to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/dump_ai_tutor.sql backup/dump_ai_tutor_prev.sql
          git diff --staged --quiet || git commit -m "backup: $(date +'%Y-%m-%d') — full dump with rotation"
          git push
