name: Weekly Database Backup
on:
  schedule:
    - cron: '0 2 * * 1'  # ogni lunedì alle 02:00 UTC
  workflow_dispatch:      # puoi anche lanciarlo manualmente

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database to SQL file
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump \
            "postgresql://postgres.${SUPABASE_PROJECT_ID}:${SUPABASE_DB_PASSWORD}@aws-1-eu-west-1.pooler.supabase.com:5432/postgres" \
            --schema=public \
            --no-owner \
            --no-acl \
            -f backup/dump_ai_tutor.sql
          echo "Dump completed"
          wc -l backup/dump_ai_tutor.sql

      - name: Commit dump to repository
        run: |
          mkdir -p backup
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/dump_ai_tutor.sql
          git diff --staged --quiet || git commit -m "backup: auto database dump $(date +'%Y-%m-%d %H:%M')"
          git push
