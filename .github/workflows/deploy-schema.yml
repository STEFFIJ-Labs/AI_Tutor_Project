name: Deploy Schema to Supabase
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Execute schema.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < schema.sql)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
          echo "schema.sql deployed successfully"

      - name: Execute add_referential_actions.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < add_referential_actions.sql)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
          echo "add_referential_actions.sql deployed successfully"

      - name: Execute verify_schema.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < verify_schema.sql)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Verification result: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
          echo "verify_schema.sql executed successfully"

      - name: Execute queries.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(jq -Rs . < queries.sql)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Query results: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
          echo "queries.sql executed successfully"

      # ──────────────────────────────────────────
      # NUOVO STEP: Backup del database (dump)
      # ──────────────────────────────────────────
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database to SQL file
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump \
            "postgresql://postgres.${SUPABASE_PROJECT_ID}:${SUPABASE_DB_PASSWORD}@aws-1-eu-west-1.pooler.supabase.com:5432/postgres" \
            --schema=public \
            --no-owner \
            --no-acl \
            -f backup/dump_ai_tutor.sql
          echo "✅ Dump completato"
          wc -l backup/dump_ai_tutor.sql

      - name: Commit dump to repository
        run: |
          mkdir -p backup
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/dump_ai_tutor.sql
          git diff --staged --quiet || git commit -m "🗄️ Auto-backup database $(date +'%Y-%m-%d %H:%M')"
          git push 

      
