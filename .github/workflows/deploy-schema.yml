name: Deploy Schema to Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug secrets (safe)
        env:
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "PROJECT starts with: ${PROJECT:0:4}..."
          echo "TOKEN starts with: ${TOKEN:0:4}..."
          echo "TOKEN length: ${#TOKEN}"

