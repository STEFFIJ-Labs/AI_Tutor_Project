name: Deploy Schema to Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Execute schema.sql via connection pooler
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          psql \
            "postgresql://postgres.${PROJECT_ID}:${PGPASSWORD}@aws-0-eu-central-1.pooler.supabase.com:6543/postgres" \
            -f schema.sql
