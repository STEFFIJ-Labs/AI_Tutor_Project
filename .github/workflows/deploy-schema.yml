name: Deploy Schema to Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute schema.sql via Supabase Management API
        run: |
          SQL=$(cat schema.sql)
          curl -s --fail-with-body \
            -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}"
