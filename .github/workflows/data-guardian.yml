name: Data Guardian — Emergency Reseed

# ============================================================
# PURPOSE: Objective 3 from project spec.
# Runs every day at 04:00 UTC. Checks if content_unit is empty.
# If empty, triggers deploy-seeds workflow automatically.
# This is the safety net against Supabase free tier data loss.
#
# Reference: Fundamentals of Database Systems Ch.25 —
# distributed systems must handle node failure and recovery.
# This workflow implements the recovery layer.
# ============================================================

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-and-reseed:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check row count in content_unit
        id: check
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT COUNT(*) AS rows FROM content_unit;"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP: $HTTP_CODE | Body: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "WARNING: Cannot reach database — may be paused."
            echo "db_reachable=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          ROWS=$(echo "$BODY" | jq -r '.[0].rows // "0"')
          echo "content_unit rows: $ROWS"
          echo "rows=$ROWS" >> $GITHUB_OUTPUT
          if [ "$ROWS" = "0" ] || [ -z "$ROWS" ]; then
            echo "db_empty=true" >> $GITHUB_OUTPUT
          else
            echo "db_empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger emergency reseed if database is empty
        if: steps.check.outputs.db_empty == 'true'
        run: |
          echo "ALERT: content_unit is empty — triggering emergency reseed."
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/STEFFIJ-Labs/AI_Tutor_Project/actions/workflows/deploy-seeds.yml/dispatches" \
            -d '{"ref": "main"}'
          echo "Deploy Seeds workflow triggered."

      - name: Report status
        run: |
          ROWS="${{ steps.check.outputs.rows }}"
          EMPTY="${{ steps.check.outputs.db_empty }}"
          if [ "$EMPTY" = "true" ]; then
            echo "STATUS: Database was empty — reseed triggered automatically."
          else
            echo "STATUS: Database healthy — content_unit has $ROWS rows."
          fi
